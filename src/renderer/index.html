<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>NAIS3</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- img-src의 nais-image:는 생성 이미지 폴더만 서빙하는 자체 프로토콜 (main/index.ts) -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: nais-image:"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
